name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun test --cwd daemon --path-ignore-patterns "**/*e2e*"
      - run: bash scripts/check-db-schema.sh
      - run: bun run build:web

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      # Build all 8 platform binaries (daemon + hook × 4 architectures)
      - run: bun run --cwd daemon build:daemon:linux-x64
      - run: bun run --cwd daemon build:daemon:linux-arm64
      - run: bun run --cwd daemon build:daemon:darwin-x64
      - run: bun run --cwd daemon build:daemon:darwin-arm64
      - run: bun run --cwd daemon build:hook:linux-x64
      - run: bun run --cwd daemon build:hook:linux-arm64
      - run: bun run --cwd daemon build:hook:darwin-x64
      - run: bun run --cwd daemon build:hook:darwin-arm64
      - run: bun run --cwd daemon build:plugin

      # Build .deb from linux-x64 binary
      - run: bash scripts/make-deb.sh daemon/agents-office-linux-x64 ${GITHUB_REF_NAME#v}

      # Verify compiled binary handles legacy DBs correctly
      - run: bash scripts/test-binary-migration.sh daemon/agents-office-linux-x64

      # Run e2e tests against compiled binary
      - run: bash scripts/test-e2e.sh

      # Build web frontend for npm package
      - run: bun run --cwd web build

      # Create GitHub Release with all assets
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            daemon/agents-office-*
            agents-office_*.deb
          generate_release_notes: true

      # Publish to npm via Trusted Publishing (OIDC)
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
      - run: npm publish --provenance --access public
